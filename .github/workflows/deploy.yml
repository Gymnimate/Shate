name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Nebo 'master', podle toho, jak se jmenuje tvoje hlavní větev

# Nastavení práv potřebných pro deploy na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Zabrání současnému běhu více sestavení stejné větve
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Application
        run: npx vite build  # Sestaví pouze statické soubory pro web do složky 'dist'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
